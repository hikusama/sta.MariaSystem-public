services:
  web:
    build: .
    ports:
      - "8001:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - appnet

  db:
    image: mariadb:10.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: stamaraiadb
      MARIADB_USER: stuser
      MARIADB_PASSWORD: stpass
    volumes:
      - mysql_data:/var/lib/mysql
      # - ./docker/initdb:/docker-entrypoint-initdb.d
    networks:
      - appnet

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpass
    depends_on:
      - db
    networks:
      - appnet

volumes:
  mysql_data:

networks:
  appnet:
    driver: bridge